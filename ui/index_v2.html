function safeGetLS(key, fallback=null){
  try{
    if(typeof window === "undefined") return fallback;
    const v = window.localStorage.getItem(key);
    return v == null ? fallback : v;
  }catch{
    return fallback;
  }
}
function safeSetLS(key, value){
  try{
    if(typeof window === "undefined") return;
    window.localStorage.setItem(key, value);
  }catch{}
}
function safeJsonParse(raw, fallback){
  try{
    const v = JSON.parse(raw);
    return v ?? fallback;
  }catch{

  }
}

/* =========================
   NORMALIZATION
   ========================= */
function toTsIso(value){
  if(!value) return "";
  const text=String(value || "").trim();
  const m=text.match(/^([A-Za-z]{3})\s+(\d{1,2})\s+(\d{2}):(\d{2})(?::(\d{2}))?$/i);
  const monthMap={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const d = m && monthMap[m[1].toLowerCase()] !== undefined
    ? new Date(new Date().getFullYear(), monthMap[m[1].toLowerCase()], Number(m[2]), Number(m[3]), Number(m[4]), Number(m[5] || "0"), 0)
    : new Date(text);
  return Number.isNaN(d.getTime()) ? "" : d.toISOString();
}

function splitSources(raw=""){
  return [...new Set(
    raw
      .split(/\/|,/)
      .map((s)=>s.trim())
      .filter(Boolean)
      .map((s)=>s.replace(/\s+\(.*?\)$/,"").trim())
      .filter(Boolean)
  )];
}
function inferEvidenceFromSource(raw){
  const sources=splitSources(raw);
  const sourceCount=Math.max(sources.length,0);
  return {sourceCount,verified:sourceCount>=MIN_EVIDENCE_SOURCES};
}
function summarizeSourceHealth(raw){
  if(!raw||typeof raw!=="object") return {ok:null,total:null};
  const rows=Object.values(raw);
  if(!rows.length) return {ok:null,total:null};
  const ok=rows.filter((r)=>Boolean(r&&r.ok)).length;
  return {ok,total:rows.length};
}
function normalizeConflictStats(raw={}){
  const toInt=(v)=>{
    const n=Number(v);
    return Number.isFinite(n)&&n>=0?Math.trunc(n):null;
  };
  const startDate=String(raw?.conflict_start_date||"2026-02-28").trim()||"2026-02-28";
  return {
    missiles_total: toInt(raw?.missiles_total),
    missiles_intercepted: toInt(raw?.missiles_intercepted),
    drones_total: toInt(raw?.drones_total),
    drones_destroyed: toInt(raw?.drones_destroyed),
    casualties_kia: toInt(raw?.casualties_kia),
    casualties_wia: toInt(raw?.casualties_wia),
    conflict_start_date: startDate,
    conflict_day: toInt(raw?.conflict_day),
    source: String(raw?.source||"fallback"),
    updated_at: String(raw?.updated_at||""),
  };
}
function normalizeIntelFeedItem(raw={}){
  const tsIso = toTsIso(raw.tsIso || raw.ts);
  const evidence = inferEvidenceFromSource(raw.src || "");
  const sourceCount = Number.isFinite(raw.sourceCount) && raw.sourceCount > 0 ? raw.sourceCount : evidence.sourceCount;
  return {
    ...raw,
    tsIso,
    ts: tsIso ? tsIso.slice(0,16).replace("T"," ") : raw.ts || "",
    text: String(raw.text || "").trim(),
    src: String(raw.src || ""),
    verified: evidence.verified,
    sourceCount: Math.max(sourceCount || 0, 0),
  };
}
function normalizeIndicatorItem(raw={}){
  const tsIso = toTsIso(raw.tsIso || raw.ts);
  const evidence = inferEvidenceFromSource(raw.src || "");
  const srcCount = Number.isFinite(raw.srcCount) && raw.srcCount > 0 ? raw.srcCount : evidence.sourceCount;
  return {
    ...raw,
    tsIso,
    ts: tsIso ? tsIso.slice(0,16).replace("T"," ") : raw.ts || "",
    srcCount: Math.max(srcCount, 0),
    cv: srcCount >= MIN_EVIDENCE_SOURCES,
    verified: srcCount >= MIN_EVIDENCE_SOURCES,
  };
}
function normalizeMetadata(raw={}){
  const n = Number(raw.egressLossETA);
  const egressLossETA = Number.isFinite(n) && n >= 0 ? n : FALLBACK_EGRESS_LOSS_ETA;
  const evidenceConf = typeof raw.evidenceConf==="number"&&Number.isFinite(raw.evidenceConf)?raw.evidenceConf:null;
  const effectiveThreshold = typeof raw.effectiveThreshold==="number"&&Number.isFinite(raw.effectiveThreshold)?raw.effectiveThreshold:null;
  const deltaScore = typeof raw.deltaScore==="number"&&Number.isFinite(raw.deltaScore)?raw.deltaScore:null;
  const urgency = typeof raw.urgency==="number"&&Number.isFinite(raw.urgency)?raw.urgency:null;
  const sourceOk = typeof raw.sourceOk==="number"&&Number.isFinite(raw.sourceOk)?raw.sourceOk:null;
  const sourceTotal = typeof raw.sourceTotal==="number"&&Number.isFinite(raw.sourceTotal)?raw.sourceTotal:null;
  const triggers = raw.triggers&&typeof raw.triggers==="object"?raw.triggers:{};
  const conflictStats = normalizeConflictStats(raw.conflictStats || {});
  return {
    egressLossETA,
    evidenceConf,
    effectiveThreshold,
    deltaScore,
    urgency,
    stateTs: raw.stateTs?String(raw.stateTs):"",
    source: raw.source?String(raw.source):"",
    status: raw.status?String(raw.status):"",
    degraded: Boolean(raw.degraded),
    sourceOk,
    sourceTotal,
    triggers,
    conflictStats,
  };
}
function normalizeHypothesisItem(raw={}){
  const id=String(raw.id||"");
  const score=Number(raw.score);
  return {
    ...raw,
    id: id || "H?",
    score: Number.isFinite(score)?score:0,
    color: String(raw.color||HYPOTHESIS_COLOR[id]||"#38bdf8"),
    name: String(raw.name||id||"Unknown"),
  };
}
function normalizeDashboard(payload){
  if(!payload||typeof payload!=="object") return null;
  const {intelFeed,indicators,hypotheses,routes,checklist}=payload;
  if(!Array.isArray(intelFeed)||!Array.isArray(indicators)||!Array.isArray(hypotheses)||!Array.isArray(routes)||!Array.isArray(checklist)) return null;
  return {
    intelFeed:intelFeed.map(normalizeIntelFeedItem),
    indicators:indicators.map(normalizeIndicatorItem),
    hypotheses:hypotheses.map(normalizeHypothesisItem),
    routes,
    checklist,
    metadata: normalizeMetadata(payload.metadata || {}),
  };
}
function hasSnapshotShape(obj){
  return obj && typeof obj==="object" && SNAPSHOT_REQUIRED_KEYS.every((k)=>Object.prototype.hasOwnProperty.call(obj,k));
}
function clampEgress(value){
  const n=Number(value);
  return Number.isFinite(n)&&n>=0?n:FALLBACK_EGRESS_LOSS_ETA;
}
function snapshotToDashboard(snapshot){
  const health = summarizeSourceHealth(snapshot.source_health);
  return {
    intelFeed: Array.isArray(snapshot.intel_feed) ? snapshot.intel_feed : [],
    indicators: Array.isArray(snapshot.indicators)
      ? snapshot.indicators.map((row)=>({
          ...row,
          srcCount: Number.isFinite(row?.srcCount) ? row.srcCount : Number(row?.src_count ?? 0),
        }))
      : [],
    hypotheses: Array.isArray(snapshot.hypotheses) ? snapshot.hypotheses.map(normalizeHypothesisItem) : [],
    routes: Array.isArray(snapshot.routes) ? snapshot.routes : [],
    checklist: Array.isArray(snapshot.checklist) ? snapshot.checklist : [],
    metadata: {
      egressLossETA: clampEgress(snapshot.egress_loss_eta),
      evidenceConf: snapshot.evidence_conf,
      effectiveThreshold: snapshot.effective_threshold,
      deltaScore: snapshot.delta_score,
      urgency: snapshot.urgency,
      stateTs: snapshot.state_ts || snapshot.snapshot_ts || "",
      source: snapshot.source || "",
      status: snapshot.status || "",
      degraded: Boolean(snapshot.degraded),
      sourceOk: health.ok,
      sourceTotal: health.total,
      triggers: snapshot.triggers || {},
      conflictStats: normalizeConflictStats(snapshot.conflict_stats || {}),
    },
  };
}
function normalizeIncomingPayload(payload){
  if(hasSnapshotShape(payload)) return normalizeDashboard(snapshotToDashboard(payload));
  return normalizeDashboard(payload);
}

function Bar({value,max=1,color,h=8}){
  const pct = max<=0 ? 0 : Math.min((value/max)*100,100);
  return <div style={{width:"100%",height:h,background:"#1e293b",borderRadius:h/2,overflow:"hidden"}}>
    <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:h/2,transition:"width 0.6s"}}/>
  </div>;
}

function Gauge({value,color,label,sub}){
  const gaugeColor=color||HYPOTHESIS_COLOR[String(label||"")]||"#38bdf8";
  const p=Math.min(Math.max(value,0),1),a=p*180,r=35,cx=45,cy=50;
  const rad=d=>(d*Math.PI)/180;
  const ea=180-a,x2=cx+r*Math.cos(rad(ea)),y2=cy-r*Math.sin(rad(ea));
  return <div style={{textAlign:"center"}}>
    <svg width={90} height={65} viewBox="0 0 90 65">
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="#1e293b" strokeWidth={5} strokeLinecap="round"/>
      {p>0&&<path d={`M ${cx-r} ${cy} A ${r} ${r} 0 ${a>180?1:0} 1 ${x2} ${y2}`} fill="none" stroke={gaugeColor} strokeWidth={5} strokeLinecap="round"/>}
      <text x={cx} y={cy-8} textAnchor="middle" fill={gaugeColor} fontSize={16} fontWeight={800} fontFamily="monospace">{value.toFixed(3)}</text>
      <text x={cx} y={cy+6} textAnchor="middle" fill="#94a3b8" fontSize={9}>{label}</text>
    </svg>
    {sub&&<div style={{fontSize:10,color:"#64748b",marginTop:-4}}>{sub}</div>}
  </div>;
}

/* =========================
   NEW: Sparkline / MultiLine
   ========================= */
function Sparkline({data=[], height=56, color="#60a5fa", min=0, max=1, fill=true, showDots=true}){
  const gradId = useMemo(()=>`g-${Math.random().toString(36).slice(2,9)}`, []);
  const width = 280;

  const pts = Array.isArray(data) ? data.map(Number).filter((v)=>Number.isFinite(v)) : [];
  if(pts.length < 2){
    return (
      <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height}}>
        <rect x="0" y="0" width={width} height={height} rx="10" fill="#0b1220" stroke="#1e293b"/>
        <text x={width/2} y={height/2} textAnchor="middle" fill="#475569" fontSize="10">no data</text>
      </svg>
    );
  }
  const clamp = (v)=>Math.min(max, Math.max(min, v));
  const span = (max-min) || 1;
  const xs = pts.map((_,i)=> (i/(pts.length-1))*width);
  const ys = pts.map((v)=> height - ((clamp(v)-min)/span)*height);

  const path = xs.map((x,i)=> `${i===0?"M":"L"} ${x.toFixed(2)} ${ys[i].toFixed(2)}`).join(" ");
  const area = `M 0 ${height} ` + xs.map((x,i)=> `L ${x.toFixed(2)} ${ys[i].toFixed(2)}`).join(" ") + ` L ${width} ${height} Z`;

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height}}>
      <defs>
        <linearGradient id={gradId} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.30"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width={width} height={height} rx="10" fill="#0b1220" stroke="#1e293b"/>
      {fill && <path d={area} fill={`url(#${gradId})`} />}
      <path d={path} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
      {showDots && xs.map((x,i)=>(
        <circle key={i} cx={x} cy={ys[i]} r={i===xs.length-1?3.4:2.2} fill={color} opacity={i===xs.length-1?1:0.6}/>
      ))}
    </svg>
  );
}

function MultiLineChart({series=[], height=120, min=0, max=1}){
  const width = 560;
  const allLens = series.map(s => (Array.isArray(s.data)? s.data.length : 0));
  const n = Math.max(0, ...allLens);

  if(n < 2){
    return (
      <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height}}>
        <rect x="0" y="0" width={width} height={height} rx="12" fill="#0b1220" stroke="#1e293b"/>
        <text x={width/2} y={height/2} textAnchor="middle" fill="#475569" fontSize="11">no history yet</text>
      </svg>
    );
  }

  const clamp = (v)=>Math.min(max, Math.max(min, v));
  const span = (max-min) || 1;
  const xs = Array.from({length:n}, (_,i)=> (i/(n-1))*width);

  const gridY = [0.25,0.5,0.75].map((p)=>height - p*height);
  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height}}>
      <rect x="0" y="0" width={width} height={height} rx="12" fill="#0b1220" stroke="#1e293b"/>
      {gridY.map((y,i)=>(
        <line key={i} x1="0" x2={width} y1={y} y2={y} stroke="#111827" strokeWidth="1"/>
      ))}
      {series.map((s,si)=>{
        const data = Array.isArray(s.data) ? s.data : [];
        const ys = xs.map((_,i)=>{
          const v = Number(data[i] ?? 0);
          const vv = Number.isFinite(v) ? clamp(v) : 0;
          return height - ((vv-min)/span)*height;
        });
        const path = xs.map((x,i)=> `${i===0?"M":"L"} ${x.toFixed(2)} ${ys[i].toFixed(2)}`).join(" ");
        const lastX = xs[xs.length-1];
        const lastY = ys[ys.length-1];
        return (
          <g key={si}>
            <path d={path} fill="none" stroke={s.color||"#60a5fa"} strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" opacity="0.95"/>
            <circle cx={lastX} cy={lastY} r="3.6" fill={s.color||"#60a5fa"} />
          </g>
        );
      })}
    </svg>
  );
}

function formatTsGST(tsIso){
  if(!tsIso) return "—";
  const d = new Date(tsIso);
  if(Number.isNaN(d.getTime())) return "—";
  return d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"Asia/Dubai"});
}

function copyText(text){
  if(!text) return;
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).catch(()=>{});
    return;
  }
  // fallback
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position="fixed";
  ta.style.left="-9999px";
  ta.style.top="-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{ document.execCommand("copy"); }catch{}
  document.body.removeChild(ta);
}

function buildOfflineSummary(dash, derived){
  const topIntel = (dash.intelFeed||[]).slice(0,3);
  const routes = Array.isArray(dash.routes) ? dash.routes : [];
  const bf = 2.0;
  const usable = routes
    .filter(r=>r.status!=="BLOCKED")
    .map(r=>{
      const eff = r.base_h*(1+r.cong)*bf;
      return {...r, eff};
    })
    .sort((a,b)=>a.eff-b.eff);

  const lines = [];
  lines.push(`요약(${new Date().toLocaleString("ko-KR",{timeZone:"Asia/Dubai"})} GST)`);
  lines.push(`- MODE: ${derived.modeState} / Gate: ${derived.gateState} / Airspace: ${derived.airspaceState} / Evidence: ${derived.evidenceState}`);
  lines.push(`- Leading: ${derived.leadingHypothesis.id} (${derived.leadingHypothesis.name}) score=${Number(derived.leadingHypothesis.score||0).toFixed(3)} / H2=${derived.h2Score.toFixed(3)} → ${derived.likelihoodLabel} (${derived.likelihoodBand})`);
  lines.push(`- RED 지표: ΔScore=${derived.ds.toFixed(3)} (thr=0.20) / Conf=${derived.ec.toFixed(3)} vs Thr=${derived.effectiveThreshold.toFixed(3)} / Urgency=${derived.urgencyScore.toFixed(2)}`);
  if(usable.length){
    lines.push(`- 추천 이동(사용 가능): ${usable.slice(0,2).map(r=>`Route ${r.id} ${r.status} ~${r.eff.toFixed(1)}h`).join(" · ")}`);
  }else{
    lines.push(`- 이동: 사용 가능 경로 없음 (모든 Route가 BLOCKED 또는 제한됨)`);
  }
  if(topIntel.length){
    lines.push(`- 주요 Intel(최신 3):`);
    topIntel.forEach(item=>{
      lines.push(`  • [${item.priority}] ${formatTsGST(item.tsIso)} — ${item.text}`);
    });
  }
  lines.push(`※ 본 요약은 대시보드 입력값 기반 “룰 기반” 자동 요약입니다.`);
  return lines.join("\n");
}

/* =========================
   NEW: Scenario Simulator
   ========================= */
function Simulator({liveDash, liveDerived, onLog=()=>{}}){
  const [sim, setSim] = useState(null);

  // initialize from live once
  useEffect(()=>{
    if(sim) return;
    const findInd = (id)=> (liveDash.indicators||[]).find(x=>x.id===id) || {};
    const i01=findInd("I01"), i02=findInd("I02"), i03=findInd("I03"), i04=findInd("I04");
    const h = (id)=> Number((liveDash.hypotheses||[]).find(x=>x.id===id)?.score || 0);

    setSim({
      egressLossETA: clampEgress(liveDash?.metadata?.egressLossETA ?? 2),
      effectiveThreshold: Number.isFinite(liveDerived?.effectiveThreshold) ? liveDerived.effectiveThreshold : 0.80,
      evidenceConf: Number.isFinite(liveDerived?.ec) ? liveDerived.ec : 0,
      deltaScore: Number.isFinite(liveDerived?.ds) ? liveDerived.ds : 0,
      degraded: Boolean(liveDash?.metadata?.degraded),
      triggers: {...(liveDash?.metadata?.triggers||{})},
      hypotheses: {H0:h("H0"), H1:h("H1"), H2:h("H2")},
      indicators: {
        I01: Number(i01.state||0),
        I02: Number(i02.state||0),
        I03: Number(i03.state||0),
        I04: Number(i04.state||0),
      },
      routes: (liveDash.routes||[]).map(r=>({
        id:r.id,
        base_h:Number(r.base_h||0),
        status:r.status,
        cong:Number(r.cong||0),
      })),
    });
  }, [sim, liveDash, liveDerived]);

  const buildDashFromSim = useCallback((s)=>{
    if(!s) return null;
    const dash = {
      intelFeed: liveDash.intelFeed || [],
      checklist: liveDash.checklist || [],
      hypotheses: [
        {id:"H0", name:"정상", score:Number(s.hypotheses.H0||0), color:"#22c55e"},
        {id:"H1", name:"악화", score:Number(s.hypotheses.H1||0), color:"#f59e0b"},
        {id:"H2", name:"철수준비", score:Number(s.hypotheses.H2||0), color:"#ef4444"},
      ],
      indicators: [
        {...((liveDash.indicators||[]).find(x=>x.id==="I01")||{}), id:"I01", state:Number(s.indicators.I01||0), srcCount:5, cv:true},
        {...((liveDash.indicators||[]).find(x=>x.id==="I02")||{}), id:"I02", state:Number(s.indicators.I02||0), srcCount:4, cv:true},
        {...((liveDash.indicators||[]).find(x=>x.id==="I03")||{}), id:"I03", state:Number(s.indicators.I03||0), srcCount:6, cv:true},
        {...((liveDash.indicators||[]).find(x=>x.id==="I04")||{}), id:"I04", state:Number(s.indicators.I04||0), srcCount:3, cv:false},
      ],
      routes: (s.routes||[]).map(r=>({
        ...r,
        note: (liveDash.routes||[]).find(x=>x.id===r.id)?.note || "",
        newsRefs: (liveDash.routes||[]).find(x=>x.id===r.id)?.newsRefs || [],
      })),
      metadata: {
        ...(liveDash.metadata||{}),
        egressLossETA: clampEgress(s.egressLossETA),
        evidenceConf: Number(s.evidenceConf||0),
        effectiveThreshold: Number(s.effectiveThreshold||0.80),
        deltaScore: Number(s.deltaScore||0),
        degraded: Boolean(s.degraded),
        triggers: {...(s.triggers||{})},
        source: "SIMULATOR",
        status: "sim",
        stateTs: new Date().toISOString(),
        conflictStats: normalizeConflictStats(liveDash?.metadata?.conflictStats||{}),
      }
    };
    return normalizeDashboard(dash) || dash;
  }, [liveDash]);

  const simDash = useMemo(()=> buildDashFromSim(sim), [sim, buildDashFromSim]);
  const simDerived = useMemo(()=> (simDash ? deriveState(simDash, sim?.egressLossETA) : null), [simDash, sim]);

  const update = (path, value)=>{
    setSim(prev=>{
      if(!prev) return prev;
      const next = structuredClone(prev);
      // tiny path setter
      const parts = path.split(".");
      let cur = next;
      for(let i=0;i<parts.length-1;i++){
        cur = cur[parts[i]];
      }
      cur[parts[parts.length-1]] = value;
      return next;
    });
  };

  const toggleTrig = (k)=>{
    setSim(prev=>{
      if(!prev) return prev;
      return {...prev, triggers:{...prev.triggers, [k]: !prev.triggers?.[k]}};
    });
  };

  if(!sim || !simDash || !simDerived){
    return <div style={{color:"#94a3b8",fontSize:12}}>Simulator initializing…</div>;
  }

  const routeStatusColor = (st)=> st==="BLOCKED"?"#ef4444":st==="CAUTION"?"#f59e0b":"#22c55e";

  return (
    <div style={{display:"grid",gridTemplateColumns:"1.15fr 0.85fr",gap:10}}>
      <Card style={{marginBottom:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap",marginBottom:10}}>

/* =========================
   DERIVE STATE (shared for UI/history/simulator)
   ========================= */
function deriveState(dash, egressLossETAOverride){
  const indicators = Array.isArray(dash?.indicators) ? dash.indicators : [];
  const hypotheses = Array.isArray(dash?.hypotheses) ? dash.hypotheses : [];
  const findIndicator = (id)=>indicators.find((row)=>row.id===id)||{};
  const i01=findIndicator("I01");
  const i02=findIndicator("I02");
  const i03=findIndicator("I03");
  const i04=findIndicator("I04");

  const hypothesesSorted=[...hypotheses].sort((a,b)=>(Number(b?.score)||0)-(Number(a?.score)||0));
  const leadingHypothesis=hypothesesSorted[0]||{id:"H?",name:"Unknown",score:0};
  const leadingColor=leadingHypothesis.id==="H2"?"#ef4444":leadingHypothesis.id==="H1"?"#f59e0b":"#22c55e";

  const dsFromMeta=dash?.metadata?.deltaScore;
  const ds=typeof dsFromMeta==="number"&&Number.isFinite(dsFromMeta)
    ? dsFromMeta
    : (hypotheses.find(h=>h.id==="H2")?.score||0)-(hypotheses.find(h=>h.id==="H1")?.score||0);

  const ecFromMeta=dash?.metadata?.evidenceConf;
  const ec=typeof ecFromMeta==="number"&&Number.isFinite(ecFromMeta)?ecFromMeta:0;

  const thresholdFromMeta=dash?.metadata?.effectiveThreshold;
  const effectiveThreshold=typeof thresholdFromMeta==="number"&&Number.isFinite(thresholdFromMeta)?thresholdFromMeta:0.80;

  const triggers=dash?.metadata?.triggers||{};
  const liveDegraded=Boolean(dash?.metadata?.degraded);

  const gateStay=(Number(i01?.state)||0)>=0.7 || Boolean(triggers.kr_leave_immediately);
  const gateStrike=Boolean(triggers.strike_detected) || (Number(i03?.state)||0)>=0.7;
  const gateRoad=Boolean(triggers.border_change) || (Number(i04?.state)||0)>=0.6;
  const gateActiveCount=[gateStay,gateStrike,gateRoad].filter(Boolean).length;
  const gateState=gateActiveCount>=2?"BLOCKED":gateActiveCount===1?"CAUTION":"OPEN";

  const modeState=liveDegraded?"DEGRADED":(Boolean(triggers.red_imminent)||ds>=0.2?"RED_PREP":"AMBER");
  const modeColor=modeState==="DEGRADED"?"#ef4444":modeState==="RED_PREP"?"#f59e0b":"#22c55e";

  const evidenceState=ec>=effectiveThreshold?"PASSED":"WATCH";
  const airspaceState=(Number(i02?.state)||0)>=0.8?"CLOSED":(Number(i02?.state)||0)>=0.5?"DISRUPTED":"OPEN";
  const airspaceHint=String(i02?.detail||"").slice(0,42);

  const h2Score=Number(hypotheses.find((row)=>row.id==="H2")?.score||0);
  const likelihoodLabel=h2Score>=0.8?"HIGHLY LIKELY":h2Score>=0.55?"LIKELY":h2Score>=0.35?"POSSIBLE":"UNLIKELY";
  const likelihoodBand=h2Score>=0.8?">=80%":h2Score>=0.55?"55-80%":h2Score>=0.35?"35-55%":"<35%";
  const likelihoodBasis=`H2 ${h2Score.toFixed(3)} / ΔScore ${ds.toFixed(3)} / Conf ${ec.toFixed(3)}`;

  const evidenceFloorT0 = indicators.filter(i=>i.tier==="TIER0"&&i.cv).length;

  const urgencyFromMeta=dash?.metadata?.urgency;
  const egress = Number.isFinite(egressLossETAOverride) ? egressLossETAOverride
    : (Number.isFinite(dash?.metadata?.egressLossETA) ? dash.metadata.egressLossETA : FALLBACK_EGRESS_LOSS_ETA);
  const urgencyScore=typeof urgencyFromMeta==="number"&&Number.isFinite(urgencyFromMeta)
    ? urgencyFromMeta
    : Math.min(1,Math.max(0,1 - egress / 12));

  const confBand=ec>=0.8?"HIGH":ec>=0.6?"MEDIUM-HIGH":ec>=0.4?"MEDIUM":"LOW";

  const conflictStats=normalizeConflictStats(dash?.metadata?.conflictStats||{});
  const conflictDayLabel=Number.isFinite(conflictStats.conflict_day)?`Day ${conflictStats.conflict_day}`:"n/a";

  const sourceOk=dash?.metadata?.sourceOk;
  const sourceTotal=dash?.metadata?.sourceTotal;
  const liveSource=dash?.metadata?.source||"n/a";
  const sourceHealthLabel=(typeof sourceOk==="number"&&Number.isFinite(sourceOk)&&typeof sourceTotal==="number"&&Number.isFinite(sourceTotal))
    ? `${sourceOk}/${sourceTotal} ok`
    : "n/a";

  const dsGap=0.20-ds;
  const dsGapLabel=ds>=0.20?`ΔScore 임계 초과 +${Math.abs(dsGap).toFixed(3)}`:`0.20까지 ${Math.abs(dsGap).toFixed(3)} 차이`;
  const dsStateIcon=ds>=0.20?"✅":"⚠";
  const dsActionLabel=ds>=0.20?"RED_PREP 조건 충족(유지)":"추가 에스컬레이션 시 RED_PREP 전환";
  const confDelta=ec-effectiveThreshold;
  const confDeltaLabel=ec>=effectiveThreshold
    ? `Conf ${ec.toFixed(3)} ≥ ${effectiveThreshold.toFixed(3)} → RED 조건 충족`
    : `Conf ${ec.toFixed(3)} < ${effectiveThreshold.toFixed(3)} → RED 미충족 (${Math.abs(confDelta).toFixed(3)} 차이)`;
  const dsEscalationLabel=ds>=0.20
    ? `ΔScore ≥ 0.20 돌파 (현재 +${(ds-0.20).toFixed(3)})`
    : `ΔScore ≥ 0.20 돌파 (현재 ${Math.abs(0.20-ds).toFixed(3)} 차이)`;

  const escalationItems=[
    {text:"한국 대사관 'Leave immediately' 발령",active:Boolean(triggers.kr_leave_immediately),note:`현재: ${Boolean(triggers.kr_leave_immediately)?"감지됨":"미감지"}`},
    {text:"미국 Level 4 Do Not Travel 격상",active:(Number(i01?.state)||0)>=0.95,note:`I01 state=${(Number(i01?.state)||0).toFixed(2)}`},
    {text:"국경 RESTRICTED/CLOSED 감지",active:Boolean(triggers.border_change),note:`I04 state=${(Number(i04?.state)||0).toFixed(2)}`},
    {text:dsEscalationLabel,active:ds>=0.20,note:`threshold=0.20`},
    {text:"추가 대규모 strike 감지",active:Boolean(triggers.strike_detected),note:`trigger=${Boolean(triggers.strike_detected)}`},
  ];
  const deEscalationItems=[
    {text:"영공 재개 + 항공 정상화",ok:airspaceState==="OPEN",note:airspaceHint||"I02 detail n/a"},
    {text:"strike window 해제",ok:!gateStrike,note:`strike=${gateStrike?"active":"clear"}`},
    {text:"국경 통제 해제",ok:!gateRoad,note:`border=${gateRoad?"restricted":"clear"}`},
    {text:"Evidence 대비 Threshold 하향 안정",ok:ec<effectiveThreshold&&ds<0.20,note:`confΔ=${(ec-effectiveThreshold).toFixed(3)}`},
  ];

  return {
    i01,i02,i03,i04,
    hypothesesSorted,leadingHypothesis,leadingColor,
    ds,ec,effectiveThreshold,confBand,
    triggers,liveDegraded,
    gateStay,gateStrike,gateRoad,gateActiveCount,gateState,
    modeState,modeColor,
    evidenceState,
    airspaceState,airspaceHint,
    h2Score,likelihoodLabel,likelihoodBand,likelihoodBasis,
    evidenceFloorT0,
    urgencyScore,
    conflictStats, conflictDayLabel,
    sourceHealthLabel, liveSource,
    dsGapLabel, dsStateIcon, dsActionLabel, confDeltaLabel,
    escalationItems, deEscalationItems,
  };
}

/* =========================
   HISTORY + TIMELINE CORE
   ========================= */
function computeDashboardKey(dash){
  if(!dash || typeof dash !== "object") return "";
  const meta = dash.metadata || {};
  const ts = String(meta.stateTs||"");
  const status = String(meta.status||"");
  const degraded = meta.degraded ? "1":"0";
  const h = Array.isArray(dash.hypotheses) ? dash.hypotheses.map(x=>`${x.id}:${Number(x.score||0).toFixed(3)}`).join("|") : "";
  const i = Array.isArray(dash.indicators) ? dash.indicators.map(x=>`${x.id}:${Number(x.state||0).toFixed(2)}:${x.cv?1:0}:${Number(x.srcCount||0)}`).join("|") : "";
  const r = Array.isArray(dash.routes) ? dash.routes.map(x=>`${x.id}:${x.status}:${Number(x.cong||0).toFixed(2)}`).join("|") : "";
  const top = (dash.intelFeed||[])[0];
  const f = top ? String(top.tsIso||top.ts||top.text||"") : "";
  return `${ts}#${status}#${degraded}#${h}#${i}#${r}#${f}`;
}

function appendHistory(prev, dash, derived){
  const key = computeDashboardKey(dash);
  if(!key) return prev;
  const last = prev[prev.length-1];
  if(last && last.key === key) return prev;

  const point = {
    key,
    ts: new Date().toISOString(),
    stateTs: String(dash?.metadata?.stateTs||""),
    scores: {
      H0: Number((dash.hypotheses||[]).find(x=>x.id==="H0")?.score || 0),
      H1: Number((dash.hypotheses||[]).find(x=>x.id==="H1")?.score || 0),
      H2: Number((dash.hypotheses||[]).find(x=>x.id==="H2")?.score || 0),
    },
    ds: Number(derived.ds||0),
    ec: Number(derived.ec||0),
    thr: Number(derived.effectiveThreshold||0.8),
    mode: derived.modeState,
    gate: derived.gateState,
    air: derived.airspaceState,
    ev: derived.evidenceState,
  };

  const next = [...prev, point];
  if(next.length > HISTORY_MAX_POINTS){
    next.splice(0, next.length - HISTORY_MAX_POINTS);
  }
  return next;
}

function mkEvent({level="INFO", category="SYSTEM", title="", detail="", ts=null}){
  return {
    id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
    ts: ts || new Date().toISOString(),
    level, category, title, detail
  };
}

function buildDiffEvents(prevDash, nextDash, prevDerived, nextDerived){
  const events = [];
  const ts = new Date().toISOString();
  if(!prevDash || !prevDerived){
    events.push(mkEvent({level:"INFO",category:"SYSTEM",title:"Dashboard loaded",detail:`source=${nextDash?.metadata?.source||"local"}`,ts}));
    return events;
  }
  if(prevDerived.modeState !== nextDerived.modeState){
    events.push(mkEvent({
      level: nextDerived.modeState==="DEGRADED"?"ALERT":nextDerived.modeState==="RED_PREP"?"WARN":"INFO",
      category:"MODE",
      title:`MODE 변경: ${prevDerived.modeState} → ${nextDerived.modeState}`,
      detail:`Δ=${nextDerived.ds.toFixed(3)} / Conf=${nextDerived.ec.toFixed(3)} / Gate=${nextDerived.gateState}`,
      ts
    }));
  }
  if(prevDerived.gateState !== nextDerived.gateState){
    events.push(mkEvent({
      level: nextDerived.gateState==="BLOCKED"?"ALERT":nextDerived.gateState==="CAUTION"?"WARN":"INFO",
      category:"GATE",
      title:`Gate 변경: ${prevDerived.gateState} → ${nextDerived.gateState}`,
      detail:`active=${nextDerived.gateActiveCount}/3 (Stay=${nextDerived.gateStay?"Y":"N"}, Strike=${nextDerived.gateStrike?"Y":"N"}, Road=${nextDerived.gateRoad?"Y":"N"})`,
      ts
    }));
  }
  if(prevDerived.airspaceState !== nextDerived.airspaceState){
    events.push(mkEvent({
      level: nextDerived.airspaceState==="CLOSED"?"ALERT":nextDerived.airspaceState==="DISRUPTED"?"WARN":"INFO",
      category:"AIRSPACE",
      title:`Airspace 변경: ${prevDerived.airspaceState} → ${nextDerived.airspaceState}`,
      detail: nextDerived.airspaceHint || "",
      ts
    }));
  }
  if(prevDerived.evidenceState !== nextDerived.evidenceState){
    events.push(mkEvent({
      level: nextDerived.evidenceState==="PASSED"?"INFO":"WARN",
      category:"EVIDENCE",
      title:`Evidence 변경: ${prevDerived.evidenceState} → ${nextDerived.evidenceState}`,
      detail:`Conf=${nextDerived.ec.toFixed(3)} vs Thr=${nextDerived.effectiveThreshold.toFixed(3)}`,
      ts
    }));
  }
  if(prevDerived.leadingHypothesis?.id !== nextDerived.leadingHypothesis?.id){
    events.push(mkEvent({
      level:"WARN",
      category:"MODE",
      title:`Leading Hypothesis: ${prevDerived.leadingHypothesis?.id||"?"} → ${nextDerived.leadingHypothesis?.id||"?"}`,
      detail:`${nextDerived.leadingHypothesis?.name||""}`,
      ts
    }));
  }
  if(prevDerived.ds < 0.20 && nextDerived.ds >= 0.20){
    events.push(mkEvent({
      level:"ALERT",
      category:"MODE",
      title:"ΔScore 임계 돌파",
      detail:`ΔScore ${nextDerived.ds.toFixed(3)} ≥ 0.20`,
      ts
    }));
  }

  // route diffs
  const prevRoutes = new Map((prevDash.routes||[]).map(r=>[r.id,r]));
  for(const r of (nextDash.routes||[])){
    const p = prevRoutes.get(r.id);
    if(!p) continue;
    if(p.status !== r.status){
      events.push(mkEvent({
        level: r.status==="BLOCKED"?"ALERT":r.status==="CAUTION"?"WARN":"INFO",
        category:"ROUTE",
        title:`Route ${r.id} 상태: ${p.status} → ${r.status}`,
        detail: r.note || "",
        ts
      }));
    }else{
      const dc = Math.abs((Number(p.cong)||0)-(Number(r.cong)||0));
      if(dc >= 0.15){
        events.push(mkEvent({
          level:"WARN",
          category:"ROUTE",
          title:`Route ${r.id} 혼잡도 변화`,
          detail:`cong ${(Number(p.cong)||0).toFixed(2)} → ${(Number(r.cong)||0).toFixed(2)}`,
          ts
        }));
      }
    }
  }

  // intel diff (top item changes)
  const prevTop = (prevDash.intelFeed||[])[0];
  const nextTop = (nextDash.intelFeed||[])[0];
  const prevKey = prevTop ? String(prevTop.tsIso||prevTop.ts||prevTop.text||"") : "";
  const nextKey = nextTop ? String(nextTop.tsIso||nextTop.ts||nextTop.text||"") : "";
  if(prevKey && nextKey && prevKey !== nextKey){
    events.push(mkEvent({
      level: nextTop.priority==="CRITICAL"?"ALERT":nextTop.priority==="HIGH"?"WARN":"INFO",
      category:"INTEL",
      title:`새 Intel: ${nextTop.priority}`,
      detail: nextTop.text || "",
      ts
    }));
  }

  return events;
}

                </div>
                <div style={{marginTop:8,fontSize:10,color:"#64748b"}}>stateTs: <span style={{color:"#94a3b8"}}>{stateTsLabel}</span></div>
              </div>
            </div>
          </Card>

          {/* Movement Gate */}
          <Card style={{marginBottom:0}}>
            <div style={{fontSize:12,fontWeight:900}}>Movement Gate</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
              <Pill label="Stay" value={derived.gateStay?"ON":"OFF"} color={derived.gateStay?"#f59e0b":"#94a3b8"} />
              <Pill label="Strike" value={derived.gateStrike?"ON":"OFF"} color={derived.gateStrike?"#ef4444":"#94a3b8"} />
              <Pill label="Border" value={derived.gateRoad?"ON":"OFF"} color={derived.gateRoad?"#f59e0b":"#94a3b8"} />
              <Pill label="Gate" value={derived.gateState} color={derived.gateState==="BLOCKED"?"#ef4444":derived.gateState==="CAUTION"?"#f59e0b":"#22c55e"} />
            </div>
            <div style={{marginTop:12,fontSize:11,color:"#94a3b8"}}>
              active: {derived.gateActiveCount}/3
            </div>
            <div style={{marginTop:10,background:"#0b1220",border:"1px solid #1e293b",borderRadius:10,padding:12,fontSize:11,color:"#e2e8f0"}}>
              <div style={{fontWeight:900,marginBottom:6}}>{derived.dsStateIcon} {derived.dsGapLabel}</div>
              <div style={{color:"#94a3b8"}}>{derived.dsActionLabel}</div>
            </div>
          </Card>

          {/* Likelihood */}
          <Card style={{marginBottom:0}}>
            <div style={{fontSize:12,fontWeight:900}}>Likelihood (H2)</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,marginTop:10}}>
              <div>
                <div style={{fontSize:22,fontWeight:900,color:derived.h2Score>=0.8?"#ef4444":derived.h2Score>=0.55?"#f59e0b":"#22c55e"}}>
                  {derived.likelihoodLabel}
                </div>
                <div style={{fontSize:11,color:"#94a3b8"}}>{derived.likelihoodBand}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:6}}>{derived.likelihoodBasis}</div>
              </div>
              <div style={{width:120}}>
                <Bar value={derived.h2Score} max={1} color={derived.h2Score>=0.8?"#ef4444":derived.h2Score>=0.55?"#f59e0b":"#22c55e"} h={10}/>
              </div>
            </div>
          </Card>

          {/* Escalation */}
          <Card style={{marginBottom:0}}>
            <div style={{fontSize:12,fontWeight:900}}>🔺 Escalation Signals</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
              {derived.escalationItems.map((item, idx)=>(
                <div key={idx} style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",padding:"10px 12px",borderRadius:10,border:`1px solid ${item.active?"#7c2d12":"#1e293b"}`,background:item.active?"rgba(245,158,11,0.10)":"#0b1220"}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:900,color:item.active?"#fbbf24":"#e2e8f0"}}>{item.text}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>{item.note}</div>
                  </div>
                  <div style={{fontSize:12,fontWeight:900,color:item.active?"#f59e0b":"#64748b"}}>{item.active?"ACTIVE":"—"}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* De-escalation */}
          <Card style={{marginBottom:0}}>
            <div style={{fontSize:12,fontWeight:900}}>🟢 De-escalation Checklist</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
              {derived.deEscalationItems.map((item, idx)=>(
                <div key={idx} style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",padding:"10px 12px",borderRadius:10,border:`1px solid ${item.ok?"#14532d":"#1e293b"}`,background:item.ok?"rgba(34,197,94,0.08)":"#0b1220"}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:900,color:item.ok?"#86efac":"#e2e8f0"}}>{item.text}</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>{item.note}</div>
                  </div>
                  <div style={{fontSize:12,fontWeight:900,color:item.ok?"#22c55e":"#64748b"}}>{item.ok?"OK":"—"}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}

      {/* ANALYSIS TAB: Trends + Timeline */}
      {tab==="analysis" && (
        <div>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:13,fontWeight:900}}>📈 Hypothesis Trend Graph</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:4}}>최근 {history.length} 포인트 (최대 {HISTORY_MAX_POINTS})</div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button
                  onClick={()=>{
                    setHistory([]);
                    logEvent({level:"INFO",category:"SYSTEM",title:"History cleared"});
                  }}
                  style={{background:"#0b1220",border:"1px solid #1e293b",color:"#94a3b8",borderRadius:10,padding:"10px 12px",fontSize:11,fontWeight:900,cursor:"pointer"}}
                >
                  Reset history
                </button>
              </div>
            </div>

            <div style={{marginTop:12}}>
              <MultiLineChart
                height={160}
                min={0}
                max={1}
                series={[
                  {id:"H0",label:"H0",color:"#22c55e",data:histH0},
                  {id:"H1",label:"H1",color:"#f59e0b",data:histH1},
                  {id:"H2",label:"H2",color:"#ef4444",data:histH2},
                ]}
              />
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}}>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748b",marginBottom:6}}>
                  <span>ΔScore trend</span><span style={{fontFamily:"monospace"}}>{derived.ds.toFixed(3)}</span>
                </div>
                <Sparkline data={histDs} min={-0.2} max={0.6} color="#f59e0b"/>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748b",marginBottom:6}}>
                  <span>EvidenceConf trend</span><span style={{fontFamily:"monospace"}}>{derived.ec.toFixed(3)}</span>
                </div>
                <Sparkline data={histEc} min={0} max={1} color="#22c55e"/>
              </div>
            </div>
          </Card>

          <Card>
            <TimelinePanel
              timeline={timeline}
              onClear={()=>{
                setTimeline([]);
                logEvent({level:"INFO",category:"SYSTEM",title:"Timeline cleared"});
              }}
              onExport={()=>{
                const text = JSON.stringify(timeline, null, 2);
                copyText(text);
                logEvent({level:"INFO",category:"SYSTEM",title:"Timeline exported (copied to clipboard)"});
              }}
            />
          </Card>
        </div>
      )}

      {/* INTEL */}
      {tab==="intel" && (
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:13,fontWeight:900}}>Intel Feed</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:4}}>filter: {ff}</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {["ALL","CRITICAL","HIGH","MEDIUM"].map(p=>(
                <button
                  key={p}
                  onClick={()=>sFF(p)}
                  style={{
                    background: ff===p ? "rgba(59,130,246,0.15)" : "#0b1220",
                    border:`1px solid ${ff===p?"#3b82f6":"#1e293b"}`,
                    color: ff===p ? "#93c5fd" : "#cbd5e1",
                    borderRadius:10,
                    padding:"10px 12px",
                    fontSize:11,
                    fontWeight:900,
                    cursor:"pointer"
                  }}
                >
                  {p}
                </button>
              ))}
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:12}}>
            {fFeed.map((item, idx)=>{
              const c=pC[item.priority]||"#94a3b8";
              return (
                <div key={idx} style={{background:"#0b1220",border:"1px solid #1e293b",borderRadius:12,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{width:10,height:10,borderRadius:"50%",background:c}}></span>
                      <span style={{fontSize:11,fontWeight:900,color:c}}>{item.priority}</span>
                      {item.verified && <span style={{fontSize:10,background:"#14532d",border:"1px solid #166534",color:"#dcfce7",padding:"2px 8px",borderRadius:999,fontWeight:900}}>VERIFIED</span>}
                    </div>
                    <div style={{fontSize:10,color:"#64748b"}}>{formatFeedTs(item)}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0",marginTop:10}}>{item.text}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>출처: {item.src}</div>
                  <div style={{fontSize:10,color:"#64748b",marginTop:6}}>impact: {item.impact}</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* INDICATORS */}
      {tab==="indicators" && (
        <Card>
          <div style={{fontSize:13,fontWeight:900,marginBottom:10}}>Indicators</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {dash.indicators.map(ind=>{
              const score=Number(ind.state)||0;
              return (
                <div key={ind.id} style={{background:"#0b1220",border:"1px solid #1e293b",borderRadius:12,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,fontWeight:900,color:"#e2e8f0"}}>{ind.id} · {ind.name}</span>
                        <span style={{fontSize:10,color:"#64748b"}}>{ind.tier}</span>
                        {ind.cv
                          ? <span style={{fontSize:10,background:"#14532d",border:"1px solid #166534",color:"#dcfce7",padding:"2px 8px",borderRadius:999,fontWeight:900}}>CV</span>
                          : <span style={{fontSize:10,background:"#7c2d12",border:"1px solid #9a3412",color:"#fed7aa",padding:"2px 8px",borderRadius:999,fontWeight:900}}>LOW EVIDENCE</span>
                        }
                      </div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:6}}>state: <span style={{fontFamily:"monospace",color:"#94a3b8"}}>{score.toFixed(2)}</span></div>
                    </div>
                    <div style={{minWidth:160}}>
                      <Bar value={score} max={1} color={score>=0.8?"#ef4444":score>=0.5?"#f59e0b":"#22c55e"} h={8}/>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#cbd5e1",marginTop:10}}>{ind.detail}</div>
                  <div style={{fontSize:10,color:"#64748b",marginTop:6}}>출처: {ind.src} · 최신: {formatFeedTs(ind)} · 소스 {Math.max(ind.srcCount||0,0)}건</div>
                </div>
              );
            })}
          </div>

          <div style={{background:"#0b1220",border:"1px solid #1e293b",borderRadius:12,padding:14,marginTop:12}}>
            <div style={{fontSize:12,fontWeight:900,color: derived.evidenceFloorT0>=3?"#22c55e":"#f59e0b"}}>
              {derived.evidenceFloorT0>=3 ? "✅ Evidence Floor PASSED" : "⚠ Evidence Floor not reached"}
              {` — TIER0 교차검증: ${derived.evidenceFloorT0}건`}
            </div>
          </div>
        </Card>
      )}

      {/* ROUTES */}
      {tab==="routes" && (
        <div>
          <Card>
            <RouteMap
              routes={dash.routes}
              selectedId={selectedRouteId}
              onSelect={(rid)=>setSelectedRouteId(prev=>prev===rid?null:rid)}
            />
            {selectedRouteId && (
              <div style={{marginTop:12,background:"#0b1220",border:"1px solid #1e293b",borderRadius:12,padding:12}}>
                <div style={{fontSize:12,fontWeight:900}}>Selected Route: {selectedRouteId}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:6}}>
                  아래 카드에서 {selectedRouteId}가 하이라이트됩니다.
                </div>
              </div>
            )}
          </Card>

          {dash.routes.map(r=>{
            const eff=r.base_h*(1+r.cong)*bf;
            const isBlocked=r.status==="BLOCKED";
            const isCaution=r.status==="CAUTION";
            const borderColor = selectedRouteId===r.id ? "#3b82f6" : (isBlocked?"#7f1d1d":isCaution?"#92400e":"#1e293b");
            const badgeBg=isBlocked?"#7f1d1d":isCaution?"#92400e":"#14532d";
            const statusColor=isBlocked?"#f87171":isCaution?"#f59e0b":"#22c55e";
            return (
              <div key={r.id} style={{background:"#0f172a",border:`2px solid ${borderColor}`,borderRadius:12,padding:16,marginBottom:10,opacity:isBlocked?0.82:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:badgeBg,fontSize:13,fontWeight:900,color:"#fff"}}>{r.id}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:900,color:"#e2e8f0"}}>{r.name}</div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:10,color:statusColor,fontWeight:900}}>{r.status}</span>
                        {isBlocked && <span style={{fontSize:9,background:"#7f1d1d",color:"#fca5a5",padding:"2px 6px",borderRadius:6,fontWeight:900}}>⛔ 사용금지</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:900,fontFamily:"monospace",color:isBlocked?"#f87171":"#e2e8f0"}}>{isBlocked?"—":eff.toFixed(1)+"h"}</div>
                    <div style={{fontSize:10,color:"#64748b"}}>{isBlocked?"차단":"effective lead"}</div>
                  </div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                  <div style={{background:"#1e293b",borderRadius:10,padding:10,textAlign:"center"}}>
                    <div style={{fontSize:10,color:"#64748b"}}>Base</div>
                    <div style={{fontSize:14,fontWeight:900,fontFamily:"monospace",color:"#94a3b8"}}>{r.base_h}h</div>
                  </div>
                  <div style={{background:"#1e293b",borderRadius:10,padding:10,textAlign:"center"}}>
                    <div style={{fontSize:10,color:"#64748b"}}>Congestion</div>
                    <div style={{fontSize:14,fontWeight:900,fontFamily:"monospace",color:r.cong>0.5?"#f87171":r.cong>0.3?"#f59e0b":"#94a3b8"}}>x{(1+r.cong).toFixed(2)}</div>
                  </div>
                  <div style={{background:"#1e293b",borderRadius:10,padding:10,textAlign:"center"}}>
                    <div style={{fontSize:10,color:"#64748b"}}>Buffer</div>
                    <div style={{fontSize:14,fontWeight:900,fontFamily:"monospace",color:"#f59e0b"}}>x{bf.toFixed(1)}</div>
                  </div>
                </div>

                <div style={{fontSize:10,color:"#94a3b8",background:"#0b1220",border:"1px solid #1e293b",borderRadius:10,padding:10,marginBottom:(r.newsRefs&&r.newsRefs.length)?10:0}}>
                  {r.note}
                </div>

                {r.newsRefs && r.newsRefs.length>0 && (
                  <div style={{background:"#0a0f1a",border:"1px solid #1e3a5f",borderRadius:10,padding:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:10,color:"#93c5fd",fontWeight:900}}>References</span>
                      <span style={{fontSize:10,color:"#475569"}}>{r.newsRefs.length} items</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {r.newsRefs.map((n,idx)=>(
                        <div key={idx} style={{display:"flex",justifyContent:"space-between",gap:10,flexWrap:"wrap",border:"1px solid #0f172a",borderRadius:10,padding:"8px 10px",background:"#0b1220"}}>
                          <div style={{fontSize:11,color:"#e2e8f0"}}><span style={{color:"#93c5fd",fontWeight:900}}>{n.src}</span> — {n.text}</div>
                          <div style={{fontSize:10,color:"#64748b"}}>{n.ts}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* SIMULATOR */}
      {tab==="sim" && (
        <Simulator
          liveDash={dash}
          liveDerived={derived}
          onLog={(ev)=>logEvent(ev)}
        />
      )}

      {/* CHECKLIST */}
      {tab==="checklist" && (
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:13,fontWeight:900}}>Checklist</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:4}}>click to toggle</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22,fontWeight:900,fontFamily:"monospace",color:cc===cl.length?"#22c55e":"#f59e0b"}}>{cc}/{cl.length}</div>
            </div>
          </div>
          <div style={{marginTop:10}}>
            <Bar value={cc} max={cl.length} color={cc===cl.length?"#22c55e":"#f59e0b"} h={8}/>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
            {cl.map(c=>(
              <div
                key={c.id}
                onClick={()=>tog(c.id)}
                style={{
                  display:"flex",
                  alignItems:"center",
                  gap:12,
                  background:c.done?"rgba(34,197,94,0.05)":"#0b1220",
                  border:`1px solid ${c.done?"#14532d":"#1e293b"}`,
                  borderRadius:12,
                  padding:"12px 14px",
                  cursor:"pointer"
                }}
              >
                <div style={{width:22,height:22,borderRadius:8,border:`2px solid ${c.done?"#22c55e":"#334155"}`,display:"flex",alignItems:"center",justifyContent:"center",background:c.done?"#22c55e":"transparent"}}>
                  {c.done && <span style={{color:"#000",fontSize:12,fontWeight:900}}>✓</span>}
                </div>
                <span style={{fontSize:13,color:c.done?"#86efac":"#e2e8f0",textDecoration:c.done?"line-through":"none",opacity:c.done?0.7:1}}>
                  {c.text}
                </span>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* FOOTER */}
      <div style={{marginTop:16,padding:"10px 16px",background:"#0f172a",borderRadius:12,border:"1px solid #1e293b",fontSize:10,color:"#475569"}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
          <span>HyIE-ERC² v2026.05 · ICD 203 · Samsung C&amp;T Logistics</span>
          <span>경보 시점 = 출구 상실 시점 − (대피 소요 × 버퍼)</span>
        </div>
        <div style={{marginTop:6,color:"#334155",fontSize:9}}>
          {`Source health: ${derived.sourceHealthLabel} · state source: ${derived.liveSource} · conflict_stats: ${derived.conflictStats.source}`}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
